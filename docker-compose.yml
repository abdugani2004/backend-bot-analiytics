services:
  postgres:
    image: postgres:16-alpine
    container_name: telegram-bot-analytics-postgres
    environment:
      POSTGRES_DB: telegram_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
